<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Хостинг</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background-color: #121212;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            background-size: cover;
            color: #fff;
            -webkit-font-smoothing: antialiased;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); z-index: 1;
        }

        .main-card {
            position: relative; z-index: 2;
            background: #1e1e1e;
            padding: 50px 35px;
            border-radius: 28px;
            width: 90%; max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        h2 { font-size: 26px; margin-bottom: 30px; font-weight: 500; letter-spacing: -0.5px; }

        .upload-zone {
            border: 2px dashed #00bcd4;
            border-radius: 20px;
            padding: 60px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 188, 212, 0.04);
            margin-bottom: 35px;
        }

        .upload-zone:hover { border-color: #00e5ff; background: rgba(0, 188, 212, 0.08); }
        .upload-zone span { font-size: 17px; color: #efefef; font-weight: 300; pointer-events: none; }

        #results { 
            margin-top: 20px; max-height: 220px; overflow-y: auto; 
            text-align: left; scrollbar-width: thin;
        }
        
        .link-item {
            background: rgba(255,255,255,0.03); 
            padding: 12px; margin-bottom: 8px;
            border-radius: 10px; font-size: 13px; color: #00bcd4;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.05);
            font-family: 'Inter', monospace;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        footer {
            border-top: 1px solid rgba(255,255,255,0.08); 
            padding-top: 25px; font-size: 11px; color: #777; font-weight: 300;
        }
        
        footer a { color: #999; text-decoration: none; border-bottom: 1px solid #444; }
        .loader { color: #00bcd4; margin-bottom: 15px; font-weight: 600; display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="main-card">
    <h2>Black Хостинг</h2>
    
    <div class="upload-zone" id="dropZone">
        <span>Выбрать или перетащить<br>файл, фото (До 200 МБ)</span>
    </div>
    <input type="file" id="fileInput" class="hidden" accept="image/*" multiple>

    <div id="loader" class="loader">ПОДОЖДИТЕ, ИДЕТ ЗАГРУЗКА...</div>
    <div id="results"></div>

    <footer>
        Броу а теперь серьезно - Загружая файлы, Ты соглашаешься с <br>
        <a href="https://catbox.moe/faq.php" target="_blank" rel="noopener">Политикой конфиденциальности Catbox</a>.<br>
        Не загружай запрещенный контент а то по попе атятя
    </footer>
</div>

<script>
    const BG_URL = 'https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1920'; 
    document.body.style.backgroundImage = `url('${BG_URL}')`;

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const results = document.getElementById('results');
    const loader = document.getElementById('loader');

    window.onload = () => {
        const history = JSON.parse(localStorage.getItem('black_history') || '[]');
        history.forEach(url => renderLink(url));
    };

    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = '#00e5ff'; };
    dropZone.ondragleave = () => { dropZone.style.borderColor = '#00bcd4'; };
    dropZone.ondrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
    fileInput.onchange = (e) => handleFiles(e.target.files);

    async function handleFiles(files) {
        if (!files.length) return;
        loader.style.display = 'block';

        for (let file of files) {
            const formData = new FormData();
            formData.append('reqtype', 'fileupload');
            formData.append('fileToUpload', file);

            try {
                // Прямой запрос через надежный прокси
                const response = await fetch('https://tmp-cors-proxy.herokuapp.com/https://catbox.moe/user/api.php', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const url = (await response.text()).trim();
                    if (url.includes('https://files.catbox.moe/')) {
                        saveAndRender(url);
                    }
                } else {
                    // Если первый прокси подвел, пробуем запасной
                    const altResponse = await fetch('https://cors-anywhere.herokuapp.com/https://catbox.moe/user/api.php', {
                        method: 'POST',
                        body: formData
                    });
                    const altUrl = (await altResponse.text()).trim();
                    if (altUrl.includes('http')) saveAndRender(altUrl);
                }
            } catch (err) {
                console.log("Ошибка загрузки. Если это локальный файл, браузер может блокировать запросы.");
            }
        }
        loader.style.display = 'none';
        fileInput.value = '';
    }

    function saveAndRender(url) {
        let history = JSON.parse(localStorage.getItem('black_history') || '[]');
        if (!history.includes(url)) {
            history.unshift(url);
            localStorage.setItem('black_history', JSON.stringify(history.slice(0, 50)));
            renderLink(url, true);
        }
    }

    function renderLink(url, isNew = false) {
        const div = document.createElement('div');
        div.className = 'link-item';
        div.innerText = url;
        div.onclick = () => {
            navigator.clipboard.writeText(url);
            const originalText = div.innerText;
            div.innerText = "СКОПИРОВАНО!";
            setTimeout(() => div.innerText = originalText, 1000);
        };
        if (isNew) results.prepend(div);
        else results.appendChild(div);
    }
</script>

</body>
</html>
